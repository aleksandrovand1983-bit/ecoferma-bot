services:
  - type: worker
    name: ecoferma-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DB_FILE
        value: /var/data/farm.db
    disk:
      name: farm-data
      mountPath: /var/data
      sizeGB: 1
